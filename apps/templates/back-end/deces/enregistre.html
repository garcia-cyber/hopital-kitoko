<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Enregistrer un décès - Moyanoli Médicale</title>
    {% include 'back-end/includes/css.html' %}
    <style>
        .form-container { max-width: 700px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="main-wrapper">
        {% include 'back-end/includes/header.html' %}
        {% include 'back-end/includes/sidebar.html' %}
        
        <div class="page-wrapper">
            <div class="content container-fluid">
                <div class="form-container">
                    <h3 class="page-title">Déclaration de décès</h3>
                    <form method="POST" action="{% url 'enregistrer_deces' %}">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label>Patient (Si enregistré)</label>
                            <select name="patient_id" class="form-control">
                                <option value="">-- Choisir un patient (Optionnel) --</option>
                                {% for p in patients %}
                                    <option value="{{ p.id }}">{{ p.noms }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Ou Nom du Patient Externe</label>
                            <input type="text" name="nom_patient_externe" class="form-control" placeholder="Nom complet si non répertorié">
                        </div>

                        <div class="row">
                            <div class="col-md-6 form-group">
                                <label>Date et Heure du décès</label>
                                <input type="datetime-local" name="date_deces" class="form-control" required>
                            </div>
                            <div class="col-md-6 form-group">
                                <label>Certifié par (Médecin)</label>
                                <input type="text" name="certifie_par" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Cause du décès</label>
                            <textarea name="cause_deces" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Notes complémentaires</label>
                            <textarea name="notes" class="form-control" rows="2"></textarea>
                        </div>

                        <button type="submit" class="btn btn-danger w-100">Enregistrer le décès</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% include 'back-end/includes/js.html' %}
</body>
</html>
