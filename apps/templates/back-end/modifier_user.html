<!DOCTYPE html>
<html lang="fr">
{% load static %}
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Moyanoli | Modifier Employé</title>
    <link href="{% static 'back-end/css/style.css' %}" rel="stylesheet">
</head>

<body>
    <div id="main-wrapper">
        <div class="nav-header">
            <div class="brand-logo">
                <a href="{% url 'dashboard' %}">
                    <span class="brand-title" style="color: white; font-weight: bold; font-size: 1.2rem;">MOYANOLI</span>
                </a>
            </div>
        </div>

        {% include 'back-end/query/header.html' %}
        {% include 'back-end/query/sidebar.html' %}

        <div class="content-body">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow">
                            <div class="card-body">
                                <h4 class="mb-4" style="border-left: 5px solid #007bff; padding-left: 15px;">
                                    Modifier les informations de {{ u.username }}
                                </h4>
                                
                                <form method="POST">
                                    {% csrf_token %}
                                    
                                    <!-- Utilisation de form.as_p pour la sécurité -->
                                    <div class="p-3 bg-light rounded">
                                        {{ form.as_p }}
                                    </div>

                                    <div class="mt-4 text-right">
                                        <a href="{% url 'employeRead' %}" class="btn btn-dark px-4">Annuler</a>
                                        <button type="submit" class="btn btn-primary px-4">Enregistrer les modifications</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'back-end/plugins/common/common.min.js' %}"></script>
    <script src="{% static 'back-end/js/custom.min.js' %}"></script>
</body>
</html>
