services:
  - type: web
    name: apps # Remplace par le nom de ton projet
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn conf.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_PATH
        value: /var/data/db.sqlite3
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
