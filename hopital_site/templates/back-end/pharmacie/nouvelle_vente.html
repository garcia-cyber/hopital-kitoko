<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITOKO - Vente Comptoir</title>
    <link rel="stylesheet" href="{% static 'back-end/assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'back-end/assets/plugins/fontawesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'back-end/assets/css/select2.min.css' %}">
    <link rel="stylesheet" href="{% static 'back-end/assets/css/style.css' %}">
    <style>
        .total-card { background: #f8f9fa; border-left: 5px solid #28a745; border-radius: 4px; }
        .total-val { font-size: 32px; font-weight: bold; color: #28a745; }
        .devise-badge { font-size: 18px; margin-left: 5px; color: #6c757d; }
        .table-responsive { max-height: 400px; overflow-y: auto; }
        .select2-container .select2-selection--single { height: 38px !important; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        {% include 'back-end/include/header.html' %}
        {% include 'back-end/include/sidebar.html' %}

        <div class="page-wrapper">
            <div class="content">
                <div class="row">
                    <div class="col-sm-12">
                        <h4 class="page-title text-uppercase"><i class="fa fa-cash-register"></i> Pharmacie - Vente au Comptoir</h4>
                    </div>
                </div>

                <div class="row">
                    <!-- Colonne de Gauche : Sélection -->
                    <div class="col-lg-5">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label class="font-weight-bold">Devise d'encaissement</label>
                                            <select id="select_devise" class="form-control" onchange="majTableau()">
                                                <option value="CDF">Franc Congolais (FC)</option>
                                                <option value="USD">Dollar (USD)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label>Taux appliqué (1$)</label>
                                            <input type="text" class="form-control bg-light" id="taux_info" value="{{ taux }}" readonly>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="font-weight-bold">Nom du Client / Patient</label>
                                    <input type="text" id="nom_client" class="form-control" placeholder="Ex: Client de passage ou Nom du patient">
                                </div>
                                <hr>
                                <div class="form-group">
                                    <label class="font-weight-bold">Rechercher un Médicament</label>
                                    <select id="select_med" class="form-control select2">
                                        <option value="">-- Taper le nom du produit --</option>
                                        {% for med in medicaments %}
                                        <option value="{{ med.id }}" 
                                                data-nom="{{ med.designation }}" 
                                                data-prix-cdf="{{ med.prix_vente_detail|stringformat:".2f" }}"
                                                data-stock="{{ med.quantite_stock_pieces }}"
                                                data-info="{{ med.forme|default:'' }} {{ med.dosage|default:'' }}">
                                            {{ med.designation }} - [Stock: {{ med.quantite_stock_pieces }}]
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <button type="button" onclick="ajouterAuPanier()" class="btn btn-primary btn-block btn-lg shadow-sm">
                                    <i class="fa fa-cart-plus"></i> Ajouter au panier
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Colonne de Droite : Panier -->
                    <div class="col-lg-7">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white border-bottom">
                                <h5 class="mb-0 font-weight-bold"><i class="fa fa-shopping-basket"></i> Panier actuel</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive" style="min-height: 250px;">
                                    <table class="table table-hover mb-0">
                                        <thead class="thead-light">
                                            <tr>
                                                <th>Produit</th>
                                                <th class="text-center" width="120">Qté</th>
                                                <th class="text-right">P.U</th>
                                                <th class="text-right">Sous-total</th>
                                                <th class="text-center">#</th>
                                            </tr>
                                        </thead>
                                        <tbody id="panier_body">
                                            <tr><td colspan="5" class="text-center text-muted py-5">Votre panier est vide</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                                
                                <div class="p-4 total-card mx-3 my-3">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="h5 mb-0 font-weight-bold">TOTAL À PAYER</span>
                                        <div>
                                            <span id="total_val" class="total-val">0</span>
                                            <span class="devise-badge font-weight-bold" id="devise_label">CDF</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="px-4 pb-4">
                                    <button type="button" id="btn_valider" onclick="validerVente()" class="btn btn-success btn-lg btn-block shadow">
                                        <i class="fa fa-check-circle"></i> CONFIRMER LA VENTE ET IMPRIMER
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{% static 'back-end/assets/js/jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'back-end/assets/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'back-end/assets/js/select2.min.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        let panier = [];
        // On remplace la virgule par un point pour que le JS traite bien le taux comme un décimal
        const TAUX = parseFloat("{{ taux }}".replace(',', '.')) || 2500;

        $(document).ready(function() {
            $('.select2').select2({
                placeholder: "-- Rechercher un produit --",
                allowClear: true
            });
        });

        function ajouterAuPanier() {
            let select = $('#select_med');
            let option = select.find(':selected');
            if (!option.val()) return;

            let id = option.val();
            let prixCDF = parseFloat(option.attr('data-prix-cdf'));
            let stock = parseInt(option.attr('data-stock'));

            if (isNaN(prixCDF) || prixCDF <= 0) {
                Swal.fire('Erreur', 'Prix invalide pour ce produit', 'error');
                return;
            }

            let existant = panier.find(item => item.id === id);
            if (existant) {
                if (existant.quantite + 1 > stock) {
                    Swal.fire('Attention', 'Stock insuffisant !', 'warning');
                    return;
                }
                existant.quantite++;
            } else {
                panier.push({
                    id: id,
                    nom: option.attr('data-nom'),
                    info: option.attr('data-info'),
                    prixCDF: prixCDF,
                    stock: stock,
                    quantite: 1
                });
            }
            majTableau();
            select.val(null).trigger('change');
        }

        function majTableau() {
            let html = '';
            let totalGlobalAffiche = 0;
            let devise = $('#select_devise').val();

            if (panier.length === 0) {
                $('#panier_body').html('<tr><td colspan="5" class="text-center text-muted py-5">Votre panier est vide</td></tr>');
                $('#total_val').text('0');
                $('#devise_label').text(devise);
                return;
            }

            panier.forEach((item, index) => {
                let prixAffiche = (devise === "USD") ? (item.prixCDF / TAUX) : item.prixCDF;
                let totalLigne = prixAffiche * item.quantite;
                totalGlobalAffiche += totalLigne;

                html += `
                <tr>
                    <td>
                        <span class="font-weight-bold d-block">${item.nom}</span>
                        <small class="text-muted text-uppercase">${item.info}</small>
                    </td>
                    <td class="text-center">
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control text-center" 
                                   value="${item.quantite}" min="1" max="${item.stock}" 
                                   onchange="modifierQte(${index}, this.value)">
                        </div>
                    </td>
                    <td class="text-right">${prixAffiche.toLocaleString(undefined, {minimumFractionDigits: devise === 'USD' ? 2 : 0})}</td>
                    <td class="text-right font-weight-bold">${totalLigne.toLocaleString(undefined, {minimumFractionDigits: devise === 'USD' ? 2 : 0})}</td>
                    <td class="text-center">
                        <button class="btn btn-outline-danger btn-sm border-0" onclick="retirer(${index})">
                            <i class="fa fa-times"></i>
                        </button>
                    </td>
                </tr>`;
            });

            $('#panier_body').html(html);
            $('#total_val').text(totalGlobalAffiche.toLocaleString(undefined, {
                minimumFractionDigits: devise === 'USD' ? 2 : 0,
                maximumFractionDigits: devise === 'USD' ? 2 : 0
            }));
            $('#devise_label').text(devise);
        }

        function modifierQte(index, qte) {
            let n = parseInt(qte);
            if (isNaN(n) || n < 1) n = 1;
            if (n > panier[index].stock) {
                Swal.fire('Stock', 'Quantité limitée à ' + panier[index].stock, 'warning');
                n = panier[index].stock;
            }
            panier[index].quantite = n;
            majTableau();
        }

        function retirer(index) {
            panier.splice(index, 1);
            majTableau();
        }

        function validerVente() {
            if (panier.length === 0) {
                Swal.fire('Panier vide', 'Veuillez ajouter au moins un produit.', 'warning');
                return;
            }

            Swal.fire({
                title: 'Confirmer la vente ?',
                text: "Cette action va déduire les produits du stock.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#28a745',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Oui, valider',
                cancelButtonText: 'Annuler'
            }).then((result) => {
                if (result.isConfirmed) {
                    processFetch();
                }
            });
        }

        function processFetch() {
            let btn = $('#btn_valider');
            btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> Traitement en cours...');

            let payload = {
                nom_client_externe: $('#nom_client').val() || "Client de passage",
                devise: $('#select_devise').val(),
                panier: panier.map(i => ({
                    id: i.id,
                    quantite: i.quantite
                }))
            };

            fetch("{% url 'effectuer_vente' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    Swal.fire('Réussi !', data.message, 'success').then(() => {
                        window.location.reload(); 
                    });
                } else {
                    Swal.fire('Erreur', data.message, 'error');
                    btn.prop('disabled', false).html('<i class="fa fa-check-circle"></i> CONFIRMER LA VENTE ET IMPRIMER');
                }
            })
            .catch(err => {
                Swal.fire('Erreur Système', 'Impossible de contacter le serveur.', 'error');
                btn.prop('disabled', false).html('<i class="fa fa-check-circle"></i> CONFIRMER LA VENTE ET IMPRIMER');
            });
        }
    </script>
</body>
</html>
