{% load static %}
<div class="header-menu">
    <div class="header-left">
        <a href="{% url 'home' %}" class="logo">
            <img src="{% static 'back-end/assets/img/Logo_Hospital.png' %}" width="35" height="35" alt="Logo"> 
            <span>{{ user.username }}</span>
        </a>
    </div>

    <div class="menubar">
        <a id="toggle_btn" href="javascript:void(0);"><i class="fas fa-bars"></i></a>
    </div>

    <a id="mobile_btn" class="mobile_btn float-left" href="#sidebar"><i class="fa fa-bars"></i></a>

    <ul class="nav user-menu float-right">
        <li class="nav-item dropdown has-arrow">
            <a href="#" class="dropdown-toggle nav-link user-link" data-toggle="dropdown">
                <span>{% if profil_connecte %}{{ profil_connecte.nomComplet }}{% else %}{{ user.username }}{% endif %}</span>&nbsp;
                <span class="user-img">
                    <img class="rounded-circle" src="{% static 'back-end/assets/img/user.jpg' %}" width="24" alt="User">
                    <span class="status online"></span>
                </span>
            </a>
            <div class="dropdown-menu">
                <a class="dropdown-item" href="{% url 'profilRead' %}">Mon Profil</a>
                <a class="dropdown-item" href="{% url 'deconnexion' %}">Déconnexion</a>
            </div>
        </li>
    </ul>

    <div class="dropdown mobile-user-menu float-right">
        <a href="#" class="dropdown-toggle" data-toggle="dropdown" aria-expanded="false"><i class="fa fa-ellipsis-v"></i></a>
        <div class="dropdown-menu dropdown-menu-right">
            <a class="dropdown-item" href="{% url 'profilRead' %}">Mon Profil</a>
            <a class="dropdown-item" href="{% url 'deconnexion' %}">Déconnexion</a>
        </div>
    </div>
</div>
