<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmer la suppression | HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .delete-card { max-width: 500px; margin-top: 100px; border-radius: 15px; border: none; }
        .icon-circle {
            width: 80px; height: 80px;
            background-color: #fff5f5;
            color: #dc3545;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin: 0 auto 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg delete-card animate__animated animate__fadeIn">
                <div class="card-body text-center p-5">
                    
                    <div class="icon-circle">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                    </div>

                    <h3 class="fw-bold text-dark">Confirmation</h3>
                    <p class="text-muted">
                        Êtes-vous sûr de vouloir supprimer définitivement le profil de :<br>
                        <span class="badge bg-light text-danger fs-6 mt-2">{{ profil.nomComplet }}</span>
                    </p>

                    <div class="alert alert-warning d-flex align-items-center text-start mt-4" role="alert">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        <div>
                            Cette action supprimera ses fonctions et services, mais son compte de connexion restera actif.
                        </div>
                    </div>

                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg shadow-sm">
                                <i class="bi bi-trash"></i> Confirmer la suppression
                            </button>
                            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm border-0">
                                Annuler et retourner
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
