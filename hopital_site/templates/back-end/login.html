<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>Hopital | login</title>

    <!-- Favicons -->
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'back-end/assets/img/favicon.ico'%}">
    
    <!-- Font Family -->
    <link href="https://fonts.googleapis.com/css?family=Fira+Sans:400,500,600,700" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'back-end/assets/css/bootstrap.min.css'%}">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" href="{% static 'back-end/assets/plugins/fontawesome/css/all.min.css'%}" >
    <link rel="stylesheet" href="{% static 'back-end/assets/plugins/fontawesome/css/fontawesome.min.css'%}" >

    <!--custom styles-->
    <link rel="stylesheet" href="{% static 'back-end/assets/css/style.css'%}">

    <!--[if lt IE 9]>
		<script src="assets/js/html5shiv.min.js"></script>
		<script src="assets/js/respond.min.js"></script>
	<![endif]-->
        <style>
            
            body{
                min-height: 100vh;
                background: linear-gradient(to left , #000 , #0008),url("{% static 'back-end/autres/img1.jpg'%}");
                background-size: cover;
                background-repeat: no-repeat;
                background-position: center;
            }
        </style>
</head>

<body>

    <!-- Main Wrapper -->
    <div class="main-wrapper account-wrapper">
        <div class="account-page">
			<div class="account-center">
				<div class="account-box">
                    <form method="post" class="form-signin">
                        
						<div class="account-logo">
                            <a href="index.html"><img src="{% static 'back-end/assets/img/logo-dark.png'%}" alt="Preadmin"></a>
                        </div>

                        {% if msg %}
                            <div class='alert alert-danger'>
                                {{msg}}
                            </div>
                        {% endif%}

                        {% csrf_token%}
                        {{ form.as_p}}
                        <div class="form-group text-right">
                            <a href="">Forgot your password?</a>
                        </div>
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-primary account-btn">Login</button>
                        </div>
                                            </form>
                </div>
                </div>
        </div>
    </div>
    <!--/ Main Wrapper -->

    <!--scripts-->
    <!-- jQuery -->
    <script src="{% static 'back-end/assets/js/jquery-3.6.0.min.js'%}"></script>

    <!-- Bootstrap Core JS -->
    <script src="{% static 'back-end/assets/js/bootstrap.bundle.min.js'%}"></script>

    <!-- Custom JS -->
    <script src="{% static 'back-end/assets/js/app.js'%}"></script> 
</body>

</html>
